data:
  raw_path: "data/raw/creditcard.csv"
  processed_path: "data/processed/processed_data.csv"
  test_size: 0.20
  val_size: 0.10
  random_state: 42
  fraud_ratio: 0.00172

preprocessing:
  scaler: "robust"
  scale_cols: ["Amount", "Time"]
  scaler_path: "models/scaler.pkl"
  feature_names_path: "models/feature_names.pkl"

features:
  add_time_features: true
  add_velocity_features: false
  add_interactions: true

resampling:
  strategy: "smote"
  smote_k_neighbors: 5

models:
  random_forest:
    n_estimators: 300
    max_depth: null
    min_samples_leaf: 2
    class_weight: "balanced"
    n_jobs: -1
    random_state: 42

  xgboost:
    n_estimators: 400
    learning_rate: 0.05
    max_depth: 6
    subsample: 0.8
    colsample_bytree: 0.8
    min_child_weight: 3
    eval_metric: "aucpr"
    n_jobs: -1
    verbosity: 0
    random_state: 42

tuning:
  enabled: false
  n_trials: 60
  cv_folds: 5
  scoring: "average_precision"
  model: "xgboost"

training:
  primary_model: "xgboost"
  model_dir: "models"
  report_dir: "reports/figures"
  results_path: "reports/model_results.csv"
  log_path: "logs/training.log"

inference:
  model_name: "xgboost_model"
  model_dir: "models"
  threshold: 0.40

api:
  host: "0.0.0.0"
  port: 8000

# ── Drift detection ─────────────────────────────────────────────────────────
drift_detection:
  enabled: true
  psi_warning:  0.10          # PSI threshold for moderate drift warning
  psi_critical: 0.25          # PSI threshold for significant drift (retrain)
  ks_alpha:     0.01          # KS test significance level
  min_sample_size: 200        # Minimum batch size for reliable drift test
  baseline_path: "models/drift_baseline.json"
  report_path:   "reports/drift_report.json"

# ── Model monitoring ─────────────────────────────────────────────────────────
monitoring:
  latency_window_size:  1000  # Rolling window for latency percentiles
  rate_window_seconds:  300   # 5-minute rolling window for rates
  fraud_rate_alert_pct: 5.0   # Alert if fraud rate exceeds this %
  p99_latency_alert_ms: 200   # Alert if P99 latency exceeds this ms

# ── Simulation ───────────────────────────────────────────────────────────────
simulation:
  api_url:    "http://localhost:8000"
  tps:        2.0             # Transactions per second
  duration:   120             # Seconds to run (0 = infinite)
  fraud_rate: 0.05            # Fraction of injected frauds
  seed:       42

# ── MLflow ───────────────────────────────────────────────────────────────────
mlflow:
  enabled:         true
  experiment_name: "fraud-detection"
  tracking_uri:    "mlruns"   # Local filesystem; set to server URI in production

# ── Retraining ───────────────────────────────────────────────────────────────
retraining:
  check_drift:     true
  min_improvement: 0.005      # Minimum PR-AUC gain to promote a new model
  backup_dir:      "models/backup"
