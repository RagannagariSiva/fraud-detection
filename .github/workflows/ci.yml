name: CI / CD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  schedule:
    # Run full test suite every Monday at 06:00 UTC
    - cron: "0 6 * * 1"

# ── Jobs ──────────────────────────────────────────────────────────────────────

jobs:
  # ── 1. Lint & type-check ────────────────────────────────────────────────────
  lint:
    name: Lint & Type-check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dev tools
        run: |
          python -m pip install --upgrade pip
          pip install ruff mypy

      - name: Ruff lint
        # notebooks/ excluded — they use Jupytext percent-format (# %%) which ruff flags
        run: ruff check src/ api/ dashboard/ simulation/ monitoring/ tests/ scripts/ main.py

      - name: Ruff format check
        run: ruff format --check src/ api/ tests/
        continue-on-error: true

      - name: Mypy type check
        run: mypy src/ api/ --ignore-missing-imports --no-strict-optional
        continue-on-error: true

  # ── 2. Unit & integration tests ─────────────────────────────────────────────
  test:
    name: Tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    needs: lint

    strategy:
      matrix:
        python-version: ["3.11"]
      fail-fast: false

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run tests with coverage
        run: |
          pytest tests/ -v \
            --cov=src \
            --cov=api \
            --cov=simulation \
            --cov=monitoring \
            --cov-report=term-missing \
            --cov-report=xml:coverage.xml \
            --cov-fail-under=60 \
            -x

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: coverage.xml
          flags: python-${{ matrix.python-version }}
        continue-on-error: true

  # ── 3. Security scan ────────────────────────────────────────────────────────
  security:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: lint

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install Bandit (SAST)
        run: pip install bandit

      - name: Run Bandit security scan
        run: |
          bandit -r src/ api/ simulation/ monitoring/ \
            -ll \
            --exclude tests/ \
            -f json \
            -o reports/bandit_report.json || true

      - name: Upload security report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: security-report
          path: reports/bandit_report.json

  # ── 4. Docker build ─────────────────────────────────────────────────────────
  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: |
          docker build -t fraudguard-ml:${{ github.sha }} .

      - name: Test container starts
        run: |
          docker run --rm \
            -e SKIP_MODEL_LOAD=true \
            fraudguard-ml:${{ github.sha }} \
            python -c "import src; print('imports OK')"
        continue-on-error: true

